name: API Usage Alert

on:
  schedule:
    # Runs every 6 hours during World Cup season
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Check api-football usage
        id: check
        run: |
          RESPONSE=$(curl -s "https://v3.football.api-sports.io/status" \
            -H "x-apisports-key: ${{ secrets.APISPORTS_KEY }}")
          USED=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['response']['requests']['current'])")
          LIMIT=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['response']['requests']['limit_day'])")
          echo "used=$USED" >> $GITHUB_OUTPUT
          echo "limit=$LIMIT" >> $GITHUB_OUTPUT
          echo "API usage: $USED / $LIMIT"
          if [ "$USED" -ge 7000 ]; then
            echo "alert=true" >> $GITHUB_OUTPUT
          else
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Create alert issue
        if: steps.check.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const used = ${{ steps.check.outputs.used }};
            const limit = ${{ steps.check.outputs.limit }};
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-limit-alert',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ API Usage Alert: ${used}/${limit} requests used today`,
                body: `## API Limit Warning\n\nCurrent usage has reached **${used} / ${limit}** requests today.\n\nThis is above the 7,000 alert threshold. The app will stop making API calls at ${limit}.\n\n**Action needed:** Check if usage is abnormal or consider upgrading the api-football plan.\n\n_This issue was created automatically by the API usage monitor._`,
                labels: ['api-limit-alert']
              });
            }
